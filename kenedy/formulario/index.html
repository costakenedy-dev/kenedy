<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Reset e Centralização */
    body, html {
      height: 100%;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #f0f2f5;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Container Quadrado Azul */
    .container-azul {
      background-color: #0056b3;
      width: 500px;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
      color: white;
    }

    h2 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 25px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Organização dos campos */
    .linha {
      display: flex;
      gap: 15px;
      margin-bottom: 15px;
    }

    .campo {
      margin-bottom: 15px;
      flex: 1;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-size: 13px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 14px;
    }

    /* Estilo do Botão */
    .btn-registro {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      border: none;
      border-radius: 6px;
      background-color: #002d5a;
      color: white;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .btn-registro:hover {
      background-color: #001a35;
    }
  </style>
</head>
<body>

  <div class="container-azul">
    <h2>Ficha de Cadastro</h2>
    
    <form>
      <div class="campo">
        <label for="nome-total">Nome Completo</label>
        <input type="text" id="nome-total" placeholder="Nome sem abreviações">
      </div>

      <div class="linha">
        <div class="campo">
          <label for="p-nome">Primeiro Nome</label>
          <input type="text" id="p-nome" placeholder="Ex: Maria">
        </div>
        <div class="campo">
          <label for="s-nome">Segundo Nome</label>
          <input type="text" id="s-nome" placeholder="Ex: Oliveira">
        </div>
      </div>

      <div class="campo">
        <label for="email">E-mail Profissional</label>
        <input type="email" id="email" placeholder="exemplo@dominio.com">
      </div>

      <div class="linha">
        <div class="campo">
          <label for="cpf">CPF</label>
          <input type="text" id="cpf" placeholder="000.000.000-00">
        </div>
        <div class="campo">
          <label for="nascimento">Data de Nascimento</label>
          <input type="date" id="nascimento">
        </div>
      </div>

      <button type="submit" class="btn-registro">SALVAR DADOS</button>
    </form>
  </div>

</body>
</html>
